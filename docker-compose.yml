services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5176:5176"
    depends_on:
      - backend
